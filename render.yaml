services:
  - type: web
    name: quantum-accelerated-pattern-matching
    env: python
    plan: free
    autoDeploy: true
    buildCommand: pip install --upgrade pip && pip install -r requirements-render.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/device
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: YOLO_MODEL
        value: yolov8n.pt
      - key: LIGHTWEIGHT_MODE
        value: "true"
      - key: QUANTUM_FAST_MODE
        value: "true"
